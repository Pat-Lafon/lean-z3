name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: Linux x64
          - os: macos-latest
            name: macOS arm64
          # TODO: Windows needs dynamic linking (Z3 only ships DLL, no static lib)

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: leanprover/lean-action@v1
        with:
          build-args: z3test

      - name: Run tests
        run: .lake/build/bin/z3test
