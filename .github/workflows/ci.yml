name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: Linux x64
          - os: macos-latest
            name: macOS arm64
          - os: windows-latest
            name: Windows x64

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install libc++ (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libc++1 libc++-dev libc++abi-dev

      - name: Set Z3 library path (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo "${{ github.workspace }}/z3-4.16.0-x64-win/bin" >> "$GITHUB_PATH"

      - name: Check FFI sync (Lean ↔ C)
        shell: bash
        run: ./scripts/check-ffi-sync.sh

      - uses: leanprover/lean-action@v1
        with:
          build-args: z3test
          use-github-cache: false

      - name: Run tests
        shell: bash
        run: .lake/build/bin/z3test
